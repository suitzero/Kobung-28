name: Android CI/CD Build Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Set Environment Variables (Gemini API Key)
        run: |
          mkdir -p src/environments
          echo "export const environment = { production: true, geminiApiKey: '${{ secrets.GEMINI_API_KEY }}' };" > src/environments/environment.prod.ts

      - name: Build Web App (Angular)
        run: npm run build -- --configuration production

      - name: Upload Web Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/kobung-app/browser/

  build-android:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm ci

      - name: Download Web Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/kobung-app/browser/

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android App (APK)
        working-directory: ./android
        run: ./gradlew assembleRelease
