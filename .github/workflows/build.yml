name: CI/CD Build Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Set Environment Variables (Gemini API Key)
        run: |
          mkdir -p src/environments
          echo "export const environment = { production: true, geminiApiKey: '${{ secrets.GEMINI_API_KEY }}' };" > src/environments/environment.prod.ts

      - name: Build Web App (Angular)
        run: npm run build -- --configuration production

      - name: Upload Web Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/kobung-app/browser/

  build-android:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm ci

      - name: Download Web Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/kobung-app/browser/

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android App (APK)
        working-directory: ./android
        run: ./gradlew assembleRelease

  build-ios:
    needs: build-web
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Web Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/kobung-app/browser/

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        if: ${{ env.BUILD_PROVISION_PROFILE_BASE64 != '' && env.BUILD_CERTIFICATE_BASE64 != '' }}
        run: |
          # 1. Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # 2. Import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | openssl base64 -d -A -out $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | openssl base64 -d -A -out $PP_PATH

          # Debug: Check if files were created and have content
          echo "Checking certificate file size and type:"
          ls -lh $CERTIFICATE_PATH
          file $CERTIFICATE_PATH

          # 3. Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 4. Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # 5. Apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Bump Build Version
        run: |
          # Bump the CFBundleVersion to GitHub Run Number to ensure unique upload
          cd ios/App
          agvtool new-version -all ${{ github.run_number }}

      - name: Build Archive
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        if: ${{ env.BUILD_PROVISION_PROFILE_BASE64 != '' }}
        run: |
          cd ios
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          PP_UUID=$(security cms -D -i $PP_PATH | /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)

          xcodebuild -workspace App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PP_UUID"

      - name: Export IPA
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        if: ${{ env.BUILD_PROVISION_PROFILE_BASE64 != '' }}
        run: |
          cd ios
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          TEAM_ID=$(security cms -D -i $PP_PATH | /usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /dev/stdin)
          APP_ID_PREFIX=$(security cms -D -i $PP_PATH | /usr/libexec/PlistBuddy -c "Print :ApplicationIdentifierPrefix:0" /dev/stdin)
          ENTITLEMENTS_APP_ID=$(security cms -D -i $PP_PATH | /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /dev/stdin)
          BUNDLE_ID=${ENTITLEMENTS_APP_ID#*.}
          PP_NAME=$(security cms -D -i $PP_PATH | /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin)

          cat << EOF > App/exportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$BUNDLE_ID</key>
                  <string>$PP_NAME</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportOptionsPlist App/exportOptions.plist \
            -exportPath $PWD/build

      - name: Decode Apple Key
        env:
          APPLE_KEY_P8_BASE64: ${{ secrets.APPLE_KEY_P8_BASE64 }}
        if: ${{ env.APPLE_KEY_P8_BASE64 != '' }}
        run: |
          # The apple-actions/upload-testflight-build action expects the raw text of the P8 key.
          # We decode the base64 string and save it to an environment variable.
          {
            echo 'APPLE_KEY_TEXT<<EOF'
            echo -n "$APPLE_KEY_P8_BASE64" | base64 --decode
            echo
            echo 'EOF'
          } >> $GITHUB_ENV

      - name: Upload to TestFlight
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        if: ${{ env.BUILD_PROVISION_PROFILE_BASE64 != '' }}
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ios/build/App.ipa
          issuer-id: ${{ secrets.APPLE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPLE_KEY_ID }}
          api-private-key: ${{ env.APPLE_KEY_TEXT }}
