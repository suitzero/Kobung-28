name: CI/CD Build Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Set Environment Variables (Gemini API Key)
        run: |
          mkdir -p src/environments
          echo "export const environment = { production: true, geminiApiKey: '${{ secrets.GEMINI_API_KEY }}' };" > src/environments/environment.prod.ts

      - name: Build Web App (Angular)
        run: npm run build -- --configuration production

      - name: Upload Web Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/kobung-app/browser/

  build-android:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm ci

      - name: Download Web Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/kobung-app/browser/

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android App (APK)
        working-directory: ./android
        run: ./gradlew assembleRelease

  build-ios:
    needs: build-web
    runs-on: macos-latest
    env:
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
      APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
      APPLE_KEY_P8_BASE64: ${{ secrets.APPLE_KEY_P8_BASE64 }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Download Web Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/kobung-app/browser/

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install Apple Certificate and Provisioning Profile
        if: ${{ env.BUILD_PROVISION_PROFILE_BASE64 != '' && env.BUILD_CERTIFICATE_BASE64 != '' }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build iOS App (Archive)
        working-directory: ./ios/App
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision

          if [ -z "$BUILD_PROVISION_PROFILE_BASE64" ]; then
            echo "No provisioning profile found. Building without code signing."
            xcodebuild build \
              -project App.xcodeproj \
              -scheme App \
              -configuration Release \
              -allowProvisioningUpdates \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY=""
          else
            # Extract the UUID and TeamIdentifier from the provisioning profile
            PP_UUID=$(security cms -D -i $PP_PATH | /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)
            TEAM_ID=$(security cms -D -i $PP_PATH | /usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /dev/stdin)

            echo "Using Provisioning Profile UUID: $PP_UUID"
            echo "Using Team ID: $TEAM_ID"

            xcodebuild archive \
              -project App.xcodeproj \
              -scheme App \
              -configuration Release \
              -archivePath $RUNNER_TEMP/App.xcarchive \
              -allowProvisioningUpdates \
              PROVISIONING_PROFILE_SPECIFIER="$PP_UUID" \
              DEVELOPMENT_TEAM="$TEAM_ID" \
              CODE_SIGN_STYLE=Manual
          fi

      - name: Export IPA
        if: ${{ env.BUILD_PROVISION_PROFILE_BASE64 != '' }}
        working-directory: ./ios/App
        run: |
          # Create an export options plist file dynamically, assuming Fastlane or manual plist might be needed later, simplifying for now if possible
          # A better approach when exact bundle ID and PP name are unknown is to let xcodebuild try to figure it out or rely on the profile we just installed
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist App/exportOptions.plist \
            -exportPath $RUNNER_TEMP/build \
            -allowProvisioningUpdates || echo "Export step may fail if exportOptions.plist is not properly configured. Please ensure you have a valid exportOptions.plist or use Fastlane."

      - name: Upload to App Store Connect
        if: ${{ env.APPLE_ISSUER_ID != '' && env.APPLE_KEY_ID != '' && env.APPLE_KEY_P8_BASE64 != '' }}
        working-directory: ./ios/App
        run: |
          # Create API key file
          mkdir -p ~/.appstoreconnect/private_keys/
          echo -n "$APPLE_KEY_P8_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_KEY_ID}.p8

          # Upload the IPA to App Store Connect
          xcrun altool --upload-app -f $RUNNER_TEMP/build/App.ipa -t ios --apiKey "$APPLE_KEY_ID" --apiIssuer "$APPLE_ISSUER_ID"
